services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jeeves
      POSTGRES_USER: jeeves
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jeeves}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeeves"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8182:8000"
    volumes:
      - chromadata:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama

  backend:
    build: ./backend
    ports:
      - "8686:8686"
    environment:
      DATABASE_URL: postgresql+asyncpg://jeeves:${POSTGRES_PASSWORD:-jeeves}@postgres:5432/jeeves
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8282"
      OLLAMA_BASE_URL: http://ollama:11434
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      PUBLIC_API_URL: http://localhost:8686
    depends_on:
      - backend

volumes:
  pgdata:
  chromadata:
  ollama_models:
